events {
    worker_connections 1024;
}

http {
    client_max_body_size 100M;

    # ── Gzip compression ──────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml
        font/woff2;

    # ── Proxy buffering defaults ──────────────────────────────────
    proxy_buffering on;
    proxy_buffer_size 16k;
    proxy_buffers 8 32k;

    upstream web {
        server web:3000;
    }

    upstream api {
        server api:8080;
    }

    upstream minio {
        server minio:9000;
    }

    upstream ml {
        server ml-service:8000;
    }

    server {
        listen 80;
        server_name dent.xyler.ai;

        # ── Static asset caching (Next.js _next/static) ──────────
        location /_next/static/ {
            proxy_pass http://web;
            proxy_set_header Host $host;
            add_header Cache-Control "public, max-age=31536000, immutable";
        }

        # ── ML Service (forensics pipeline) ───────────────────────
        location /ml/ {
            rewrite ^/ml/(.*) /$1 break;
            proxy_pass http://ml;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 300s;
            client_max_body_size 50M;
        }

        # ── API ───────────────────────────────────────────────────
        location /api/ {
            proxy_pass http://api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 300s;
        }

        # ── MinIO storage (images — long cache) ──────────────────
        location /storage/ {
            rewrite ^/storage/(.*) /$1 break;
            proxy_pass http://minio;
            proxy_set_header Host minio:9000;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_buffering off;
            add_header Cache-Control "public, max-age=31536000, immutable";
            add_header X-Content-Type-Options "nosniff";
        }

        # ── Next.js frontend (default) ───────────────────────────
        location / {
            proxy_pass http://web;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }
}
