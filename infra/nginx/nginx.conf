events {
    worker_connections 1024;
}

http {
    client_max_body_size 100M;

    # ── Logging ─────────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'rt=$request_time';
    access_log /var/log/nginx/access.log main;
    error_log /var/log/nginx/error.log warn;

    # ── Gzip compression ──────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml
        font/woff2;

    # ── Proxy buffering defaults ──────────────────────────────────
    proxy_buffering on;
    proxy_buffer_size 16k;
    proxy_buffers 8 32k;

    # ── Rate limiting zones ───────────────────────────────────────
    limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/m;
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
    limit_req_zone $binary_remote_addr zone=upload:10m rate=3r/m;

    upstream web {
        server web:3000;
    }

    upstream api {
        server api:8080;
    }

    upstream minio {
        server minio:9000;
    }

    upstream ml {
        server ml-service:8000;
    }

    # ── HTTP → HTTPS redirect ──────────────────────────────────
    server {
        listen 80;
        server_name dent.xyler.ai;

        # Let's Encrypt ACME challenge
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ── HTTPS server ───────────────────────────────────────────
    server {
        listen 443 ssl;
        http2 on;
        server_name dent.xyler.ai;

        # ── TLS configuration ───────────────────────────────────
        ssl_certificate /etc/letsencrypt/live/dent.xyler.ai/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/dent.xyler.ai/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
        ssl_prefer_server_ciphers off;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 1d;
        ssl_session_tickets off;

        # ── Security headers ──────────────────────────────────────
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(self), microphone=(), geolocation=(self)" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        # ── Internal auth validation (for auth_request subrequests) ──
        location = /auth-validate {
            internal;
            proxy_pass http://api/api/auth/validate;
            proxy_pass_request_body off;
            proxy_set_header Content-Length "";
            proxy_set_header Cookie $http_cookie;
            proxy_set_header X-Original-URI $request_uri;
        }

        # ── Static asset caching (Next.js _next/static) ──────────
        location /_next/static/ {
            proxy_pass http://web;
            proxy_set_header Host $host;
            add_header Cache-Control "public, max-age=31536000, immutable";
        }

        # ── Auth endpoints (strict rate limit) ────────────────────
        location /api/auth/ {
            limit_req zone=auth burst=10 nodelay;
            proxy_pass http://api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
        }

        # ── ML Service (forensics pipeline) ───────────────────────
        location /ml/ {
            limit_req zone=upload burst=5 nodelay;
            rewrite ^/ml/(.*) /$1 break;
            proxy_pass http://ml;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 300s;
            client_max_body_size 50M;
        }

        # ── API ───────────────────────────────────────────────────
        location /api/ {
            limit_req zone=api burst=50 nodelay;
            proxy_pass http://api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_read_timeout 300s;
        }

        # ── MinIO storage (images — requires auth via cookie) ────
        location /storage/ {
            auth_request /auth-validate;

            rewrite ^/storage/(.*) /$1 break;
            proxy_pass http://minio;
            proxy_set_header Host minio:9000;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_buffering off;
            add_header Cache-Control "public, max-age=31536000, immutable";
            add_header X-Content-Type-Options "nosniff" always;
        }

        # ── Next.js frontend (default) ───────────────────────────
        location / {
            proxy_pass http://web;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }
}
