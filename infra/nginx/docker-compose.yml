# Shared nginx reverse proxy — runs at /opt/nginx on the server
# All projects connect via the external 'proxy' Docker network

networks:
  proxy:
    external: true

services:
  nginx:
    image: nginx:alpine
    container_name: shared-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./sites:/etc/nginx/sites:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    networks:
      - proxy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"
