name: Deploy to Production

on:
  push:
    branches: [main]

jobs:
  test-ml:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/ml-service
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: services/ml-service/requirements.txt

      - name: Install test dependencies
        run: pip install pytest pytest-asyncio pydantic pydantic-settings numpy pillow scipy PyWavelets

      - name: Run core tests (fusion + stacking_meta)
        run: pytest tests/test_fusion.py tests/test_stacking_meta.py -v

  deploy:
    needs: test-ml
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          port: ${{ secrets.DEPLOY_PORT || '22' }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -e
            DEPLOY_DIR="${{ secrets.DEPLOY_PATH || '/opt/dent' }}"

            # Init git repo if needed
            if [ ! -d "$DEPLOY_DIR/.git" ]; then
              cd /tmp
              rm -rf dent-clone
              git clone https://github.com/${{ github.repository }}.git dent-clone
              mv dent-clone/.git "$DEPLOY_DIR/.git"
              rm -rf dent-clone
              cd "$DEPLOY_DIR"
              git reset --hard origin/main
            else
              cd "$DEPLOY_DIR"
              git fetch origin main
              git reset --hard origin/main
            fi

            docker compose -f docker-compose.server.yml build --parallel --no-cache
            docker compose -f docker-compose.server.yml up -d --force-recreate --remove-orphans
            docker image prune -f
