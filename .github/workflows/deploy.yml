name: Deploy to Production

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          port: ${{ secrets.DEPLOY_PORT || '22' }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -e
            DEPLOY_DIR="${{ secrets.DEPLOY_PATH || '/opt/dent' }}"

            # Init git repo if needed
            if [ ! -d "$DEPLOY_DIR/.git" ]; then
              cd /tmp
              rm -rf dent-clone
              git clone https://github.com/${{ github.repository }}.git dent-clone
              mv dent-clone/.git "$DEPLOY_DIR/.git"
              rm -rf dent-clone
              cd "$DEPLOY_DIR"
              git reset --hard origin/main
            else
              cd "$DEPLOY_DIR"
              git fetch origin main
              git reset --hard origin/main
            fi

            docker compose -f docker-compose.server.yml build --no-cache --parallel
            docker compose -f docker-compose.server.yml up -d --force-recreate --remove-orphans
            docker image prune -f
