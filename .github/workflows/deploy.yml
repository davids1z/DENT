name: Deploy to Production

on:
  push:
    branches: [main]

jobs:
  test-ml:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/ml-service
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: services/ml-service/requirements.txt

      - name: Install test dependencies
        run: pip install pytest pytest-asyncio pydantic pydantic-settings numpy pillow scipy PyWavelets

      - name: Run core tests (fusion + stacking_meta)
        run: pytest tests/test_fusion.py tests/test_stacking_meta.py -v

  deploy:
    needs: test-ml
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          port: ${{ secrets.DEPLOY_PORT || '22' }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -e
            DEPLOY_DIR="${{ secrets.DEPLOY_PATH || '/opt/dent' }}"

            # Init git repo if needed
            if [ ! -d "$DEPLOY_DIR/.git" ]; then
              cd /tmp
              rm -rf dent-clone
              git clone https://github.com/${{ github.repository }}.git dent-clone
              mv dent-clone/.git "$DEPLOY_DIR/.git"
              rm -rf dent-clone
              cd "$DEPLOY_DIR"
              git reset --hard origin/main
            else
              cd "$DEPLOY_DIR"
              git fetch origin main
              # Fix ownership on files that Docker may have created as root
              sudo chown -R "$(whoami):$(id -gn)" services/ml-service/models/ 2>/dev/null || true
              sudo chown -R "$(whoami):$(id -gn)" config/ 2>/dev/null || true
              git checkout -- . 2>/dev/null || true
              git reset --hard origin/main
            fi

            # Pre-deploy: backup database
            echo "Backing up database before deploy..."
            mkdir -p "$DEPLOY_DIR/backups"
            docker compose -f docker-compose.server.yml exec -T postgres \
              pg_dump -U dent --no-owner dent \
              | gzip > "$DEPLOY_DIR/backups/pre-deploy-$(date +%Y%m%d_%H%M%S).sql.gz" || \
              echo "WARNING: Database backup failed (DB may not be running yet)"

            # Build and deploy
            docker compose -f docker-compose.server.yml build --parallel
            docker compose -f docker-compose.server.yml up -d --force-recreate
            docker image prune -f

            # Post-deploy: verify API health
            echo "Waiting 20s for services to start..."
            sleep 20
            if curl -sf http://127.0.0.1:3200/api/health > /dev/null; then
              echo "Deploy verified — API healthy"
            else
              echo "WARNING: API health check failed after deploy"
              docker compose -f docker-compose.server.yml logs --tail=30 api
              exit 1
            fi

            # Cleanup old backups (keep 14 days)
            find "$DEPLOY_DIR/backups" -name "*.sql.gz" -mtime +14 -delete 2>/dev/null || true
