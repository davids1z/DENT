name: Run Calibration Pipeline

on:
  workflow_dispatch:
    inputs:
      step:
        description: 'Which step to run'
        required: true
        default: 'build'
        type: choice
        options:
          - build
          - train
          - all

jobs:
  calibrate:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - name: Run calibration on server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          port: ${{ secrets.DEPLOY_PORT || '22' }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          command_timeout: 360m
          envs: AWS_KEY,AWS_SECRET,STEP
          script: |
            set -e
            cd /opt/dent

            echo "=== DENT Calibration Pipeline (step: $STEP) ==="

            docker compose -f docker-compose.server.yml exec -T ml-service \
              pip install boto3 tqdm 2>/dev/null || true

            if [ "$STEP" = "build" ] || [ "$STEP" = "all" ]; then
              echo ""
              echo "=== Step 1: Build calibration dataset ==="
              echo "Sending 1802 images through forensic pipeline..."

              docker compose -f docker-compose.server.yml exec -T \
                -e AWS_ACCESS_KEY_ID="$AWS_KEY" \
                -e AWS_SECRET_ACCESS_KEY="$AWS_SECRET" \
                -e AWS_DEFAULT_REGION=eu-central-1 \
                ml-service \
                python -m scripts.build_calibration_dataset \
                  --bucket dent-calibration-data \
                  --output /app/data/labeled_dataset.jsonl \
                  --api-url http://localhost:8000 \
                  --skip-gemini \
                  --resume

              echo "Build complete!"
              docker compose -f docker-compose.server.yml exec -T ml-service \
                wc -l /app/data/labeled_dataset.jsonl
            fi

            if [ "$STEP" = "train" ] || [ "$STEP" = "all" ]; then
              echo ""
              echo "=== Step 2: GHOST threshold calibration ==="
              docker compose -f docker-compose.server.yml exec -T ml-service \
                python -m scripts.calibrate_ghost \
                  --data /app/data/labeled_dataset.jsonl \
                  --tiers 1,2 \
                  --output /app/config/calibrated_thresholds.json

              echo ""
              echo "=== Step 3: Train stacking meta-learner ==="
              docker compose -f docker-compose.server.yml exec -T ml-service \
                python -m scripts.train_stacking_meta \
                  --data /app/data/labeled_dataset.jsonl \
                  --output /app/models/stacking_meta/meta_weights.npz \
                  --compare

              echo ""
              echo "=== Calibration complete! ==="
              echo "Restarting ML service to load calibrated models..."
              docker compose -f docker-compose.server.yml restart ml-service
            fi
        env:
          AWS_KEY: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          STEP: ${{ github.event.inputs.step }}
