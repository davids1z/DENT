name: Calibrate

on:
  workflow_dispatch:

jobs:
  calibrate:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - name: Setup and run calibration
        uses: appleboy/ssh-action@v1
        env:
          AKEY: ${{ secrets.AWS_ACCESS_KEY_ID }}
          ASECRET: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          port: ${{ secrets.DEPLOY_PORT || '22' }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          command_timeout: 360m
          envs: AKEY,ASECRET
          script: |
            cd /opt/dent

            # Clean old AWS lines and add new ones (quoted for special chars)
            sed -i '/AWS_ACCESS_KEY_ID/d' .env 2>/dev/null || true
            sed -i '/AWS_SECRET_ACCESS_KEY/d' .env 2>/dev/null || true
            echo "AWS_ACCESS_KEY_ID='$AKEY'" >> .env
            echo "AWS_SECRET_ACCESS_KEY='$ASECRET'" >> .env

            # Restart ml-service with new env vars
            docker compose -f docker-compose.server.yml up -d ml-service

            # Wait for service to be ready
            sleep 30

            # Install deps
            docker compose -f docker-compose.server.yml exec -T ml-service pip install boto3 tqdm 2>/dev/null || true

            # Run calibration build
            echo "=== Starting calibration build ==="
            docker compose -f docker-compose.server.yml exec -T ml-service python -m scripts.build_calibration_dataset --bucket dent-calibration-data --output /app/data/labeled_dataset.jsonl --api-url http://localhost:8000 --skip-gemini --resume

            echo "=== Build complete ==="
            docker compose -f docker-compose.server.yml exec -T ml-service wc -l /app/data/labeled_dataset.jsonl
