name: Calibrate

on:
  workflow_dispatch:

jobs:
  calibrate:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - name: Run calibration build
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          port: ${{ secrets.DEPLOY_PORT || '22' }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          command_timeout: 360m
          script: |
            cd /opt/dent
            docker compose -f docker-compose.server.yml exec -T ml-service pip install boto3 tqdm 2>/dev/null || true
            docker compose -f docker-compose.server.yml exec -T ml-service python -c "
            import os
            os.makedirs('/root/.aws', exist_ok=True)
            with open('/root/.aws/credentials', 'w') as f:
                f.write('[default]\n')
                f.write('aws_access_key_id = ${{ secrets.AWS_ACCESS_KEY_ID }}\n')
                f.write('aws_secret_access_key = ${{ secrets.AWS_SECRET_ACCESS_KEY }}\n')
                f.write('region = eu-central-1\n')
            print('AWS credentials written')
            "
            docker compose -f docker-compose.server.yml exec -T ml-service python -m scripts.build_calibration_dataset --bucket dent-calibration-data --output /app/data/labeled_dataset.jsonl --api-url http://localhost:8000 --skip-gemini --resume
            docker compose -f docker-compose.server.yml exec -T ml-service wc -l /app/data/labeled_dataset.jsonl
