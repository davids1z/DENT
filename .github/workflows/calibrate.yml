name: Calibrate

on:
  workflow_dispatch:

jobs:
  calibrate:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - name: Create credentials file
        env:
          AWS_KEY: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: |
          mkdir -p /tmp/creds
          printf '[default]\naws_access_key_id = %s\naws_secret_access_key = %s\nregion = eu-central-1\n' "$AWS_KEY" "$AWS_SECRET" > /tmp/creds/credentials

      - name: Upload credentials to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          port: ${{ secrets.DEPLOY_PORT || '22' }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          source: /tmp/creds/credentials
          target: /tmp/
          strip_components: 2

      - name: Run calibration
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          port: ${{ secrets.DEPLOY_PORT || '22' }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          command_timeout: 360m
          script: |
            cd /opt/dent
            CONTAINER_ID=$(docker compose -f docker-compose.server.yml ps -q ml-service)
            docker compose -f docker-compose.server.yml exec -T ml-service pip install boto3 tqdm 2>/dev/null || true
            docker compose -f docker-compose.server.yml exec -T ml-service mkdir -p /root/.aws
            docker cp /tmp/credentials "$CONTAINER_ID":/root/.aws/credentials
            rm -f /tmp/credentials
            echo "=== Starting calibration build ==="
            docker compose -f docker-compose.server.yml exec -T ml-service python -m scripts.build_calibration_dataset --bucket dent-calibration-data --output /app/data/labeled_dataset.jsonl --api-url http://localhost:8000 --skip-gemini --resume
            echo "=== Build complete ==="
            docker compose -f docker-compose.server.yml exec -T ml-service wc -l /app/data/labeled_dataset.jsonl
