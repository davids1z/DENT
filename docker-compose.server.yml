secrets:
  db_password:
    file: ./secrets/db_password.txt
  jwt_secret:
    file: ./secrets/jwt_secret.txt
  admin_password:
    file: ./secrets/admin_password.txt
  minio_access_key:
    file: ./secrets/minio_access_key.txt
  minio_secret_key:
    file: ./secrets/minio_secret_key.txt

services:
  # ── PostgreSQL ────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: dent
      POSTGRES_USER: dent
      POSTGRES_PASSWORD_FILE: /run/secrets/db_password
    secrets:
      - db_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dent"]
      interval: 15s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ── MinIO (S3-compatible object storage) ──────────────────────────
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER_FILE: /run/secrets/minio_access_key
      MINIO_ROOT_PASSWORD_FILE: /run/secrets/minio_secret_key
    secrets:
      - minio_access_key
      - minio_secret_key
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 15s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ── MinIO init (creates bucket + sets public download policy) ─────
  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    secrets:
      - minio_access_key
      - minio_secret_key
    entrypoint: >
      /bin/sh -c "
      MINIO_USER=$$(cat /run/secrets/minio_access_key);
      MINIO_PASS=$$(cat /run/secrets/minio_secret_key);
      mc alias set local http://minio:9000 $$MINIO_USER $$MINIO_PASS;
      mc mb local/dent-images --ignore-existing;
      mc anonymous set download local/dent-images;
      echo 'MinIO initialized: bucket=dent-images, policy=download';
      exit 0;
      "

  # ── ML Service (Python forensic analysis) ─────────────────────────
  ml-service:
    build: ./services/ml-service
    deploy:
      resources:
        limits:
          memory: 10G
        reservations:
          memory: 6G
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=30)"]
      interval: 60s
      timeout: 30s
      retries: 5
      start_period: 300s
    environment:
      # ── Runtime ──────────────────────────────────────────────────
      HF_HUB_OFFLINE: "1"
      TRANSFORMERS_OFFLINE: "1"
      TORCH_HOME: "/app/models"
      HF_HOME: "/app/models/huggingface"
      OMP_NUM_THREADS: "2"
      MKL_NUM_THREADS: "2"
      MALLOC_TRIM_THRESHOLD_: "131072"
      DENT_UVICORN_WORKERS: "1"
      DENT_THREAD_POOL_SIZE: "6"
      DENT_MAX_CONCURRENT_ANALYSES: "1"
      # ── S3 (for calibration data access) ─────────────────────────
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_DEFAULT_REGION: eu-central-1
      # ── Module enables (must match config.py defaults) ───────────
      # Only list modules that DIFFER from config.py defaults.
      # config.py is the source of truth. These env vars override it.
      DENT_FORENSICS_CNN_ENABLED: "false"
      DENT_FORENSICS_OPTICAL_ENABLED: "false"
      DENT_FORENSICS_SEMANTIC_ENABLED: "false"
      DENT_FORENSICS_SPECTRAL_ENABLED: "false"
      DENT_FORENSICS_VAE_RECON_ENABLED: "false"
      DENT_FORENSICS_AIGEN_ENABLED: "false"
      # ── Meta-learner ─────────────────────────────────────────────
      DENT_FORENSICS_STACKING_META_ENABLED: "${DENT_STACKING_META_ENABLED:-false}"
      DENT_FORENSICS_CALIBRATION_FILE: "${DENT_CALIBRATION_FILE:-}"
      # ── Evidence ─────────────────────────────────────────────────
      DENT_EVIDENCE_ENABLED: "true"
      DENT_EVIDENCE_TSA_URL: "https://freetsa.org/tsr"
    volumes:
      - ml_models:/app/models
      - ./config:/app/config:ro
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  # ── .NET API ──────────────────────────────────────────────────────
  api:
    build:
      context: ./src
      dockerfile: DENT.API/Dockerfile
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 256M
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/api/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    secrets:
      - db_password
      - jwt_secret
      - admin_password
      - minio_access_key
      - minio_secret_key
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__DefaultConnection: "Host=postgres;Database=dent;Username=dent;Password=FROM_SECRET"
      MlService__BaseUrl: "http://ml-service:8000"
      Storage__ServiceUrl: "http://minio:9000"
      Storage__AccessKey: "FROM_SECRET"
      Storage__SecretKey: "FROM_SECRET"
      Storage__BucketName: dent-images
      Storage__PublicUrl: "https://dent.xyler.ai/storage/dent-images"
      Jwt__Secret: "FROM_SECRET"
      Jwt__Issuer: "DENT"
      Jwt__Audience: "DENT"
      Jwt__ExpiryHours: "24"
      Admin__Email: "${ADMIN_EMAIL:-admin@dent.hr}"
      Admin__Password: "FROM_SECRET"
      Cors__Origins__0: "https://dent.xyler.ai"
      Cors__Origins__1: "http://dent.xyler.ai"
      SECRETS_DIR: /run/secrets
    depends_on:
      postgres:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
      ml-service:
        condition: service_healthy
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "3"

  # ── Next.js Frontend ──────────────────────────────────────────────
  web:
    build:
      context: ./clients/web
      args:
        NEXT_PUBLIC_API_URL: "/api"
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:3000/', r => { process.exit(r.statusCode === 200 ? 0 : 1) }).on('error', () => process.exit(1))\""]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s
    depends_on:
      - api
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ── Nginx reverse proxy ───────────────────────────────────────────
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infra/certbot/conf:/etc/letsencrypt:ro
      - ./infra/certbot/www:/var/www/certbot:ro
    # Remove default.conf that conflicts with our nginx.conf
    entrypoint: ["/bin/sh", "-c", "rm -f /etc/nginx/conf.d/default.conf && nginx -g 'daemon off;'"]
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    depends_on:
      web:
        condition: service_healthy
      api:
        condition: service_healthy
      minio:
        condition: service_healthy
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"

  # ── Certbot (auto SSL renewal) ────────────────────────────────────
  certbot:
    image: certbot/certbot
    volumes:
      - ./infra/certbot/conf:/etc/letsencrypt
      - ./infra/certbot/www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done'"
    restart: unless-stopped

volumes:
  postgres_data:
  minio_data:
  ml_models:
