services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: dent
      POSTGRES_USER: dent
      POSTGRES_PASSWORD: ${DB_PASSWORD:-dent_secret_2024}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dent"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${MINIO_ACCESS_KEY:-minioadmin} ${MINIO_SECRET_KEY:-minioadmin};
      mc mb local/dent-images --ignore-existing;
      mc anonymous set public local/dent-images;
      exit 0;
      "

  ml-service:
    build: ./services/ml-service
    environment:
      # HuggingFace offline mode — skip online version checks, use local cache only.
      # Models are cached in the ml_models Docker volume mounted at /app/models.
      # Code sets explicit cache_dir per-analyzer, so HF_HOME is a fallback only.
      HF_HUB_OFFLINE: "1"
      TRANSFORMERS_OFFLINE: "1"
      TORCH_HOME: "/app/models"
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_DEFAULT_REGION: eu-central-1
      DENT_OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      DENT_MODEL: google/gemini-2.5-pro-preview
      DENT_FORENSICS_ENABLED: "true"
      DENT_FORENSICS_ELA_QUALITY: "95"
      DENT_FORENSICS_ELA_SCALE: "20"
      DENT_FORENSICS_C2PA_ENABLED: "true"
      DENT_FORENSICS_CNN_ENABLED: "false"
      DENT_FORENSICS_CNN_METHODS: "catnet,trufor"
      DENT_FORENSICS_OPTICAL_ENABLED: "false"
      DENT_FORENSICS_SEMANTIC_ENABLED: "true"
      DENT_FORENSICS_SEMANTIC_FACE_ENABLED: "false"
      DENT_FORENSICS_SEMANTIC_VLM_ENABLED: "false"
      DENT_FORENSICS_SEMANTIC_VLM_MODEL: "google/gemini-2.5-pro-preview"
      DENT_FORENSICS_SPECTRAL_ENABLED: "false"
      DENT_FORENSICS_VAE_RECON_ENABLED: "false"
      DENT_FORENSICS_AIGEN_ENABLED: "false"
      DENT_FORENSICS_AIGEN_METHODS: "sdxl,vit"
      DENT_FORENSICS_EFFICIENTNET_AI_ENABLED: "true"
      DENT_FORENSICS_SAFE_AI_ENABLED: "true"
      DENT_FORENSICS_DINOV2_AI_ENABLED: "true"
      DENT_FORENSICS_DOCUMENT_ENABLED: "true"
      DENT_FORENSICS_DOCUMENT_SIGNATURE_VERIFICATION: "true"
      DENT_FORENSICS_OFFICE_ENABLED: "true"
      DENT_AGENT_ENABLED: "true"
      DENT_AGENT_MODEL: ""
      DENT_AGENT_STP_COST_THRESHOLD: "500"
      DENT_AGENT_ESCALATION_COST_THRESHOLD: "3000"
      DENT_AGENT_STP_MAX_FORENSIC_RISK: "0.25"
      DENT_AGENT_ESCALATION_FORENSIC_RISK: "0.75"
      DENT_EVIDENCE_ENABLED: "true"
      DENT_EVIDENCE_TSA_URL: "https://freetsa.org/tsr"
      # Calibration — enable after running calibration pipeline
      DENT_FORENSICS_CALIBRATION_FILE: "${DENT_CALIBRATION_FILE:-}"
      DENT_FORENSICS_STACKING_META_ENABLED: "${DENT_STACKING_META_ENABLED:-false}"
      DENT_FORENSICS_STACKING_META_WEIGHTS: "${DENT_STACKING_META_WEIGHTS:-}"
    volumes:
      - ml_models:/app/models
      - ./config:/app/config:ro
    restart: unless-stopped

  api:
    build:
      context: ./src
      dockerfile: DENT.API/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__DefaultConnection: "Host=postgres;Database=dent;Username=dent;Password=${DB_PASSWORD:-dent_secret_2024}"
      MlService__BaseUrl: "http://ml-service:8000"
      Storage__ServiceUrl: "http://minio:9000"
      Storage__AccessKey: ${MINIO_ACCESS_KEY:-minioadmin}
      Storage__SecretKey: ${MINIO_SECRET_KEY:-minioadmin}
      Storage__BucketName: dent-images
      Storage__PublicUrl: "https://dent.xyler.ai/storage/dent-images"
      Cors__Origins__0: "https://dent.xyler.ai"
      Cors__Origins__1: "http://dent.xyler.ai"
    depends_on:
      postgres:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
      ml-service:
        condition: service_started
    restart: unless-stopped

  web:
    build:
      context: ./clients/web
      args:
        NEXT_PUBLIC_API_URL: "/api"
    depends_on:
      - api
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "127.0.0.1:3200:80"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - web
      - api
      - minio
    restart: unless-stopped

volumes:
  postgres_data:
  minio_data:
  ml_models:
