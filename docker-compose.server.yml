services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: dent
      POSTGRES_USER: dent
      POSTGRES_PASSWORD: ${DB_PASSWORD:-dent_secret_2024}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dent"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${MINIO_ACCESS_KEY:-minioadmin} ${MINIO_SECRET_KEY:-minioadmin};
      mc mb local/dent-images --ignore-existing;
      mc anonymous set public local/dent-images;
      exit 0;
      "

  ml-service:
    build: ./services/ml-service
    environment:
      DENT_OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      DENT_MODEL: google/gemini-2.5-pro-preview
    restart: unless-stopped

  api:
    build:
      context: ./src
      dockerfile: DENT.API/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__DefaultConnection: "Host=postgres;Database=dent;Username=dent;Password=${DB_PASSWORD:-dent_secret_2024}"
      MlService__BaseUrl: "http://ml-service:8000"
      Storage__ServiceUrl: "http://minio:9000"
      Storage__AccessKey: ${MINIO_ACCESS_KEY:-minioadmin}
      Storage__SecretKey: ${MINIO_SECRET_KEY:-minioadmin}
      Storage__BucketName: dent-images
      Storage__PublicUrl: "https://dent.xyler.ai/storage/dent-images"
      Cors__Origins__0: "https://dent.xyler.ai"
      Cors__Origins__1: "http://dent.xyler.ai"
    depends_on:
      postgres:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
      ml-service:
        condition: service_started
    restart: unless-stopped

  web:
    build:
      context: ./clients/web
      args:
        NEXT_PUBLIC_API_URL: "/api"
    depends_on:
      - api
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "127.0.0.1:3200:80"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - web
      - api
      - minio
    restart: unless-stopped

volumes:
  postgres_data:
  minio_data:
