secrets:
  db_password:
    file: ./secrets/db_password.txt
  jwt_secret:
    file: ./secrets/jwt_secret.txt
  admin_password:
    file: ./secrets/admin_password.txt
  minio_access_key:
    file: ./secrets/minio_access_key.txt
  minio_secret_key:
    file: ./secrets/minio_secret_key.txt

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: dent
      POSTGRES_USER: dent
      POSTGRES_PASSWORD_FILE: /run/secrets/db_password
    secrets:
      - db_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dent"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER_FILE: /run/secrets/minio_access_key
      MINIO_ROOT_PASSWORD_FILE: /run/secrets/minio_secret_key
    secrets:
      - minio_access_key
      - minio_secret_key
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    secrets:
      - minio_access_key
      - minio_secret_key
    entrypoint: >
      /bin/sh -c "
      MINIO_USER=$$(cat /run/secrets/minio_access_key);
      MINIO_PASS=$$(cat /run/secrets/minio_secret_key);
      mc alias set local http://minio:9000 $$MINIO_USER $$MINIO_PASS;
      mc mb local/dent-images --ignore-existing;
      mc anonymous set public local/dent-images;
      exit 0;
      "

  ml-service:
    build: ./services/ml-service
    deploy:
      resources:
        limits:
          memory: 8G
        reservations:
          memory: 5G
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 180s
    environment:
      HF_HUB_OFFLINE: "1"
      TRANSFORMERS_OFFLINE: "1"
      TORCH_HOME: "/app/models"
      OMP_NUM_THREADS: "4"
      MKL_NUM_THREADS: "4"
      MALLOC_TRIM_THRESHOLD_: "131072"
      DENT_UVICORN_WORKERS: "2"
      DENT_THREAD_POOL_SIZE: "8"
      DENT_MAX_CONCURRENT_ANALYSES: "3"
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_DEFAULT_REGION: eu-central-1
      DENT_FORENSICS_ENABLED: "true"
      DENT_FORENSICS_ELA_QUALITY: "95"
      DENT_FORENSICS_ELA_SCALE: "20"
      DENT_FORENSICS_C2PA_ENABLED: "true"
      DENT_FORENSICS_CNN_ENABLED: "false"
      DENT_FORENSICS_CNN_METHODS: "catnet,trufor"
      DENT_FORENSICS_OPTICAL_ENABLED: "false"
      DENT_FORENSICS_SEMANTIC_ENABLED: "false"
      DENT_FORENSICS_SEMANTIC_FACE_ENABLED: "false"
      DENT_FORENSICS_SPECTRAL_ENABLED: "false"
      DENT_FORENSICS_VAE_RECON_ENABLED: "false"
      DENT_FORENSICS_AIGEN_ENABLED: "false"
      DENT_FORENSICS_AIGEN_METHODS: "sdxl,vit"
      DENT_FORENSICS_EFFICIENTNET_AI_ENABLED: "true"
      DENT_FORENSICS_SAFE_AI_ENABLED: "true"
      DENT_FORENSICS_DINOV2_AI_ENABLED: "true"
      DENT_FORENSICS_BFREE_ENABLED: "true"
      DENT_FORENSICS_SPAI_ENABLED: "true"
      DENT_FORENSICS_NPR_ENABLED: "false"
      DENT_FORENSICS_DOCUMENT_ENABLED: "true"
      DENT_FORENSICS_DOCUMENT_SIGNATURE_VERIFICATION: "true"
      DENT_FORENSICS_OFFICE_ENABLED: "true"
      DENT_EVIDENCE_ENABLED: "true"
      DENT_EVIDENCE_TSA_URL: "https://freetsa.org/tsr"
      DENT_FORENSICS_CALIBRATION_FILE: "${DENT_CALIBRATION_FILE:-}"
      DENT_FORENSICS_STACKING_META_ENABLED: "${DENT_STACKING_META_ENABLED:-false}"
      DENT_FORENSICS_STACKING_META_WEIGHTS: "${DENT_STACKING_META_WEIGHTS:-}"
    volumes:
      - ml_models:/app/models
      - ./config:/app/config:ro
    restart: unless-stopped

  api:
    build:
      context: ./src
      dockerfile: DENT.API/Dockerfile
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 256M
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/api/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    secrets:
      - db_password
      - jwt_secret
      - admin_password
      - minio_access_key
      - minio_secret_key
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__DefaultConnection: "Host=postgres;Database=dent;Username=dent;Password=FROM_SECRET"
      MlService__BaseUrl: "http://ml-service:8000"
      Storage__ServiceUrl: "http://minio:9000"
      Storage__AccessKey: "FROM_SECRET"
      Storage__SecretKey: "FROM_SECRET"
      Storage__BucketName: dent-images
      Storage__PublicUrl: "https://dent.xyler.ai/storage/dent-images"
      Jwt__Secret: "FROM_SECRET"
      Jwt__Issuer: "DENT"
      Jwt__Audience: "DENT"
      Jwt__ExpiryHours: "24"
      Admin__Email: "${ADMIN_EMAIL:-admin@dent.hr}"
      Admin__Password: "FROM_SECRET"
      Cors__Origins__0: "https://dent.xyler.ai"
      Cors__Origins__1: "http://dent.xyler.ai"
      # Paths to Docker secrets files (read by Program.cs)
      SECRETS_DIR: /run/secrets
    depends_on:
      postgres:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
      ml-service:
        condition: service_healthy
    restart: unless-stopped

  web:
    build:
      context: ./clients/web
      args:
        NEXT_PUBLIC_API_URL: "/api"
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:3000/', r => { process.exit(r.statusCode === 200 ? 0 : 1) }).on('error', () => process.exit(1))\""]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s
    depends_on:
      - api
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "127.0.0.1:3200:80"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      web:
        condition: service_healthy
      api:
        condition: service_healthy
      minio:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
  minio_data:
  ml_models:
