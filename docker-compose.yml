services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: dent
      POSTGRES_USER: dent
      POSTGRES_PASSWORD: dent_secret_2024
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dent"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin;
      mc mb local/dent-images --ignore-existing;
      mc anonymous set public local/dent-images;
      exit 0;
      "

  ml-service:
    build: ./services/ml-service
    environment:
      DENT_ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      DENT_CLAUDE_MODEL: claude-sonnet-4-20250514
    ports:
      - "8000:8000"
    restart: unless-stopped

  api:
    build:
      context: ./src
      dockerfile: DENT.API/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__DefaultConnection: "Host=postgres;Database=dent;Username=dent;Password=dent_secret_2024"
      MlService__BaseUrl: "http://ml-service:8000"
      Storage__ServiceUrl: "http://minio:9000"
      Storage__AccessKey: minioadmin
      Storage__SecretKey: minioadmin
      Storage__BucketName: dent-images
      Storage__PublicUrl: "http://localhost:9000/dent-images"
      Cors__Origins__0: "http://localhost:3000"
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
      ml-service:
        condition: service_started
    restart: unless-stopped

  web:
    build:
      context: ./clients/web
      args:
        NEXT_PUBLIC_API_URL: "http://localhost:8080/api"
    ports:
      - "3000:3000"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  postgres_data:
  minio_data:
