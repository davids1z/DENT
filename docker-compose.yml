services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: dent
      POSTGRES_USER: dent
      POSTGRES_PASSWORD: dent_secret_2024
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dent"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin;
      mc mb local/dent-images --ignore-existing;
      mc anonymous set public local/dent-images;
      exit 0;
      "

  ml-service:
    build: ./services/ml-service
    environment:
      DENT_OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      DENT_MODEL: google/gemini-2.5-pro-preview
      DENT_FORENSICS_ENABLED: "true"
      DENT_FORENSICS_ELA_QUALITY: "95"
      DENT_FORENSICS_ELA_SCALE: "20"
      DENT_FORENSICS_C2PA_ENABLED: "true"
      DENT_FORENSICS_CNN_ENABLED: "true"
      DENT_FORENSICS_CNN_METHODS: "catnet,trufor"
      DENT_FORENSICS_OPTICAL_ENABLED: "true"
      DENT_FORENSICS_SEMANTIC_ENABLED: "true"
      DENT_FORENSICS_SEMANTIC_FACE_ENABLED: "true"
      DENT_FORENSICS_SEMANTIC_VLM_ENABLED: "true"
      DENT_FORENSICS_SEMANTIC_VLM_MODEL: "google/gemini-2.5-pro-preview"
      DENT_FORENSICS_DOCUMENT_ENABLED: "true"
      DENT_FORENSICS_DOCUMENT_SIGNATURE_VERIFICATION: "true"
      DENT_AGENT_ENABLED: "true"
      DENT_AGENT_MODEL: ""
      DENT_AGENT_STP_COST_THRESHOLD: "500"
      DENT_AGENT_ESCALATION_COST_THRESHOLD: "3000"
      DENT_AGENT_STP_MAX_FORENSIC_RISK: "0.25"
      DENT_AGENT_ESCALATION_FORENSIC_RISK: "0.75"
      DENT_EVIDENCE_ENABLED: "true"
      DENT_EVIDENCE_TSA_URL: "https://freetsa.org/tsr"
    volumes:
      - ml_models:/app/models
    ports:
      - "8000:8000"
    restart: unless-stopped

  api:
    build:
      context: ./src
      dockerfile: DENT.API/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__DefaultConnection: "Host=postgres;Database=dent;Username=dent;Password=dent_secret_2024"
      MlService__BaseUrl: "http://ml-service:8000"
      Storage__ServiceUrl: "http://minio:9000"
      Storage__AccessKey: minioadmin
      Storage__SecretKey: minioadmin
      Storage__BucketName: dent-images
      Storage__PublicUrl: "https://dent.xyler.ai/storage/dent-images"
      Jwt__Secret: "${JWT_SECRET:-DENT-production-jwt-secret-change-me-min32chars!!}"
      Jwt__Issuer: "DENT"
      Jwt__Audience: "DENT"
      Jwt__ExpiryHours: "24"
      Admin__Email: "${ADMIN_EMAIL:-admin@dent.hr}"
      Admin__Password: "${ADMIN_PASSWORD:-Admin123!}"
      Cors__Origins__0: "https://dent.xyler.ai"
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
      ml-service:
        condition: service_started
    restart: unless-stopped

  web:
    build:
      context: ./clients/web
      args:
        NEXT_PUBLIC_API_URL: "/api"
    ports:
      - "3000:3000"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  postgres_data:
  minio_data:
  ml_models:
